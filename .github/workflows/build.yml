name: Build Android NDK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Build arm64-v8a
      run: |
        mkdir -p build_arm64
        cd build_arm64
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-21 \
          -DCMAKE_BUILD_TYPE=Release
        cmake --build .

    - name: Upload arm64-v8a
      uses: actions/upload-artifact@v4
      with:
        name: lib-arm64-v8a
        path: build_arm64/libsrxmanager.so

  build-armv7:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Build armeabi-v7a
      run: |
        mkdir -p build_armv7
        cd build_armv7
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=armeabi-v7a \
          -DANDROID_PLATFORM=android-21 \
          -DCMAKE_BUILD_TYPE=Release
        cmake --build .

    - name: Upload armeabi-v7a
      uses: actions/upload-artifact@v4
      with:
        name: lib-armeabi-v7a
        path: build_armv7/libsrxmanager.so
